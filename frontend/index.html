<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Realm-level SimCompanies resource market indices powered by Simcotools data."
    />
    <title>Simco Indices</title>
    <script>
      window.SIMCO_MAINTENANCE_UNTIL = "2026-06-18T17:00:00-04:00"
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      .maintenance-frame {
        display: block;
        width: 100%;
        height: 100vh;
        border: 0;
        background: #0c1714;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const maintenanceUntil = new Date(window.SIMCO_MAINTENANCE_UNTIL).getTime()
      const root = document.getElementById("root")

      if (Date.now() < maintenanceUntil) {
        const frame = document.createElement("iframe")
        frame.className = "maintenance-frame"
        frame.title = "Maintenance"
        frame.src = "/maintenance.html"
        root.appendChild(frame)
      } else {
        import("/src/main.tsx")
      }
    </script>
  </body>
</html>
