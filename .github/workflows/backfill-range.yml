name: Backfill historical range

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "First market date to backfill, YYYY-MM-DD"
        required: true
      end_date:
        description: "Last market date to backfill, YYYY-MM-DD"
        required: true
      realm:
        description: "Realm to backfill: all, 0, or 1"
        required: true
        default: "all"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: collector
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: collector/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Backfill historical market data
        run: npm run backfill:30d
        env:
          BACKFILL_START_DATE: ${{ inputs.start_date }}
          BACKFILL_END_DATE: ${{ inputs.end_date }}
          BACKFILL_REALM: ${{ inputs.realm }}
          SIMCO_SUPABASE_URL: ${{ secrets.SIMCO_SUPABASE_URL }}
          SIMCO_SUPABASE_SECRET_KEY: ${{ secrets.SIMCO_SUPABASE_SECRET_KEY }}
