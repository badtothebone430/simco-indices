name: Collect market data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: collector
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: collector/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Collect market data
        run: npm run collect
        env:
          SIMCO_SUPABASE_URL: ${{ secrets.SIMCO_SUPABASE_URL }}
          SIMCO_SUPABASE_SECRET_KEY: ${{ secrets.SIMCO_SUPABASE_SECRET_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
